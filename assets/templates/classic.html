<div class="template-classic">
  <div class="handout-content">
    <div class="handout-header">
      <h1 class="title">{{topic}}</h1>
      <div class="meta-info">
        <span class="meta-item">{{subject}}</span>
        <span class="meta-item">{{grade}}</span>
        <span class="meta-item">{{difficulty}}</span>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <!-- 知识速览 -->
    <div class="module knowledge-overview">
      <div class="module-header">
        <div class="module-icon">★</div>
        <div class="module-title">知识速览</div>
      </div>
      <div class="module-content">
        {{knowledge_overview}}
      </div>
    </div>
    
    <!-- 重点精讲 -->
    <div class="module key-explanation">
      <div class="module-header">
        <div class="module-icon">▶</div>
        <div class="module-title">重点精讲</div>
      </div>
      <div class="module-content">
        {{key_explanation}}
      </div>
    </div>
    
    <!-- 典例分析 -->
    <div class="module classic-examples">
      <div class="module-header">
        <div class="module-icon">●</div>
        <div class="module-title">典例分析</div>
      </div>
      <div class="module-content">
        {{classic_examples}}
      </div>
    </div>
    
    <!-- 变式训练 -->
    <div class="module variation-training">
      <div class="module-header">
        <div class="module-icon">◆</div>
        <div class="module-title">变式训练</div>
      </div>
      <div class="module-content">
        {{variation_training}}
      </div>
    </div>
    
    <!-- 易错警示 -->
    <div class="module common-mistakes">
      <div class="module-header">
        <div class="module-icon">⚠</div>
        <div class="module-title">易错警示</div>
      </div>
      <div class="module-content">
        {{common_mistakes}}
      </div>
    </div>
    
    <!-- 巩固练习 -->
    <div class="module practice-section">
      <div class="module-header">
        <div class="module-icon">✎</div>
        <div class="module-title">巩固练习</div>
      </div>
      <div class="module-content">
        {{practice}}
      </div>
    </div>
    
    <!-- 知识总结 -->
    <div class="module summary-section">
      <div class="module-header">
        <div class="module-icon">◉</div>
        <div class="module-title">知识总结</div>
      </div>
      <div class="module-content">
        {{summary}}
      </div>
    </div>
  </div>
</div>
