<div class="template-problem-solving">
  <div class="handout-content">
    <h1 class="title">{{topic}} 解题训练</h1>
    
    <div class="problem-type-tag">解题步骤</div>
    
    <div class="problem-statement">
      <strong>题目：</strong>
      <div>{{introduction}}</div>
    </div>
    
    <div class="key-formula">
      <strong>相关公式/定理：</strong>
      <div>{{keyPoints}}</div>
    </div>
    
    <div class="solution-section">
      <div class="solution-title">详细解答</div>
      <ol class="step-list">
        {{examples}}
      </ol>
    </div>
    
    <div class="method-summary">
      <div class="method-title">解题方法总结</div>
      <ul class="method-list">
        {{summary}}
      </ul>
    </div>
    
    <div class="similar-problems">
      <div class="similar-title">同类练习</div>
      <div class="similar-items">
        {{practice}}
      </div>
    </div>
    
    <div class="answer-box">
      <div class="answer-label">参考答案</div>
      <div class="answer-value">{{answer}}</div>
    </div>
  </div>
</div>
