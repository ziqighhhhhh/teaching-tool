<div class="template-card">
  <div class="handout-content">
    <h1 class="title">{{topic}}</h1>
    
    <div class="card-container">
      <div class="core-concept">
        <div class="concept-title">核心概念</div>
        <div class="concept-text">{{topic}}</div>
      </div>
      
      <div class="section-title">定义</div>
      <div class="introduction">
        {{introduction}}
      </div>
      
      <div class="section-title">关键要点</div>
      <div class="point-list">
        {{keyPoints}}
      </div>
      
      <div class="section-title">核心公式</div>
      <div class="formula-card">
        <div class="formula-text">{{formula}}</div>
        <div class="formula-desc">{{formulaDesc}}</div>
      </div>
      
      <div class="section-title">例题</div>
      <div class="examples">
        {{examples}}
      </div>
      
      <div class="memory-tip">
        <div class="tip-title">记忆口诀</div>
        <div>{{summary}}</div>
      </div>
      
      <div class="quick-check">
        <div class="check-title">快速检测</div>
        <div class="check-items">
          {{practice}}
        </div>
      </div>
    </div>
  </div>
</div>
