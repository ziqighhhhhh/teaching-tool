<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讲义生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>讲义生成器</h1>
        
        <div class="input-group">
            <label>知识点</label>
            <input type="text" id="topic" placeholder="输入知识点（如：一元一次方程）" value="一元一次方程">
        </div>
        
        <div class="input-group">
            <label>年级</label>
            <select id="grade">
                <option value="七年级" selected>七年级</option>
                <option value="八年级">八年级</option>
                <option value="九年级">九年级</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>难度</label>
            <select id="difficulty">
                <option value="basic" selected>基础</option>
                <option value="advanced">进阶</option>
                <option value="extension">拓展</option>
            </select>
        </div>
        
        <button onclick="generate()">生成讲义</button>
        
        <pre id="output"></pre>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
