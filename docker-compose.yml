version: '3.8'

services:
  teaching-tool:
    build: .
    ports:
      - "8082:8082"
    volumes:
      # 向量数据库持久化（包含预处理后的教材数据）
      - ./data/chroma_db:/app/data/chroma_db
      # 解析后的教材数据
      - ./data/textbooks:/app/data/textbooks
      # 检查点和日志
      - ./data/checkpoints:/app/data/checkpoints
      - ./data/logs:/app/data/logs
      # 环境变量
      - ./.env:/app/.env
    environment:
      - NODE_ENV=production
      - PORT=8082
    restart: unless-stopped
    # 资源限制（可选，根据服务器配置调整）
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 2G

